<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" width="1200" height="1200" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <!-- Deep editorial backdrop, matches dossier theme -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#0b1020"/>
      <stop offset="55%"  stop-color="#111935"/>
      <stop offset="100%" stop-color="#0b1020"/>
    </linearGradient>

    <!-- Brand mark gradient (same hues as app) -->
    <linearGradient id="markGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#3b82f6"/>
      <stop offset="55%"  stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>

    <!-- Soft brand glows -->
    <radialGradient id="glowA" cx="0.18" cy="0.15" r="0.6">
      <stop offset="0%"   stop-color="#6366f1" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0.85" cy="0.9" r="0.6">
      <stop offset="0%"   stop-color="#14b8a6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#14b8a6" stop-opacity="0"/>
    </radialGradient>

    <!-- Concentric "trace" rings gradient -->
    <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#60a5fa" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#14b8a6" stop-opacity="0.0"/>
    </linearGradient>

    <!-- Subtle dot grid -->
    <pattern id="dots" width="36" height="36" patternUnits="userSpaceOnUse">
      <circle cx="1.2" cy="1.2" r="1.2" fill="#ffffff" fill-opacity="0.05"/>
    </pattern>

    <!-- Shield drop shadow -->
    <filter id="shieldShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background layers -->
  <rect width="1200" height="1200" fill="url(#bg)"/>
  <rect width="1200" height="1200" fill="url(#dots)"/>
  <rect width="1200" height="1200" fill="url(#glowA)"/>
  <rect width="1200" height="1200" fill="url(#glowB)"/>

  <!-- Concentric trace rings around the mark -->
  <g transform="translate(600 520)" fill="none" stroke="url(#ringGrad)" stroke-width="1.2">
    <circle r="210" stroke-opacity="0.55"/>
    <circle r="280" stroke-opacity="0.40"/>
    <circle r="360" stroke-opacity="0.28"/>
    <circle r="450" stroke-opacity="0.18"/>
  </g>

  <!-- Faint money-flow arcs (suggesting cross-border tracing) -->
  <g fill="none" stroke-linecap="round" filter="url(#softGlow)" opacity="0.85">
    <path d="M170 720 Q 420 540 600 620" stroke="#60a5fa" stroke-opacity="0.45" stroke-width="2"/>
    <path d="M1030 720 Q 800 560 600 620" stroke="#14b8a6" stroke-opacity="0.45" stroke-width="2"/>
    <path d="M260 360 Q 430 460 600 430" stroke="#8b5cf6" stroke-opacity="0.40" stroke-width="1.6"/>
    <path d="M940 360 Q 770 460 600 430" stroke="#60a5fa" stroke-opacity="0.40" stroke-width="1.6"/>
  </g>

  <!-- Brand mark: shield with magnifier (matches app icon language) -->
  <g transform="translate(420 340)" filter="url(#shieldShadow)">
    <rect x="0" y="0" width="360" height="360" rx="80" fill="url(#markGrad)"/>
    <g transform="translate(78 64)" stroke="#ffffff" stroke-width="14" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <!-- Shield outline -->
      <path d="M14 14 H140 L196 70 V198 C196 234 168 256 105 268 C42 256 14 234 14 198 Z" fill="rgba(255,255,255,0.08)"/>
      <!-- Magnifier (the "trace") -->
      <circle cx="100" cy="150" r="34"/>
      <path d="M124 174 L156 206"/>
    </g>
  </g>

  <!-- Wordmark -->
  <g text-anchor="middle">
    <text x="600" y="820" fill="#ffffff" font-size="118" font-weight="900" letter-spacing="-2.5">ClearTrace</text>
    <text x="600" y="880" fill="#94a3b8" font-size="26" font-weight="700" letter-spacing="6.5">AML  INTELLIGENCE  SUITE</text>
  </g>

  <!-- Tagline pill -->
  <g transform="translate(220 960)">
    <rect x="0" y="0" width="760" height="74" rx="37" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.18"/>
    <text x="380" y="48" text-anchor="middle" fill="#e2e8f0" font-size="26" font-weight="700" letter-spacing="0.6">
      Catch financial crime in real time
    </text>
  </g>

  <!-- URL footer -->
  <text x="600" y="1110" text-anchor="middle" fill="#64748b" font-size="22" font-weight="600" letter-spacing="3">
    CLEARTRACE.AURIMAS.IO
  </text>
</svg>

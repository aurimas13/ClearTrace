<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 627" width="1200" height="627" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <!-- Page background: matches the live dashboard's #fafbff -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fafbff"/>
      <stop offset="60%" stop-color="#f3f4ff"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>

    <!-- Soft brand accent washes (subtle) -->
    <radialGradient id="glow" cx="0.88" cy="0.12" r="0.7">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.05" cy="0.95" r="0.7">
      <stop offset="0%" stop-color="#14b8a6" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#14b8a6" stop-opacity="0"/>
    </radialGradient>

    <!-- Brand mark gradient (same as app) -->
    <linearGradient id="markGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="55%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>

    <!-- Card background (white, slate border) -->
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fcfdff"/>
    </linearGradient>

    <!-- Corridor arcs -->
    <linearGradient id="arcRed" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#dc2626" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#dc2626" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#dc2626" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="arcAmber" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d97706" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#d97706" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#d97706" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="arcGreen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#059669" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#059669" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#059669" stop-opacity="0.2"/>
    </linearGradient>

    <!-- Very subtle dot grid -->
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#cbd5e1" fill-opacity="0.35"/>
    </pattern>

    <!-- Card shadow -->
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.06"/>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Backdrop -->
  <rect width="1200" height="627" fill="url(#bg)"/>
  <rect width="1200" height="627" fill="url(#dots)"/>
  <rect width="1200" height="627" fill="url(#glow)"/>
  <rect width="1200" height="627" fill="url(#glow2)"/>

  <!-- ───── LEFT COLUMN ───── -->

  <!-- Logo + wordmark -->
  <g transform="translate(64, 64)">
    <rect x="0" y="0" width="56" height="56" rx="14" fill="url(#markGrad)" filter="url(#cardShadow)"/>
    <g transform="translate(12, 10)" stroke="#ffffff" stroke-width="2.6" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M5 4 H22 L29 11 V32 H5 Z" fill="rgba(255,255,255,0.1)"/>
      <circle cx="17" cy="22" r="4.5"/>
      <path d="M20.5 25.5 L24 29"/>
    </g>
    <text x="74" y="26" fill="#0f172a" font-size="26" font-weight="800" letter-spacing="-0.5">ClearTrace</text>
    <text x="74" y="48" fill="#64748b" font-size="13" font-weight="600" letter-spacing="0.5">AML INTELLIGENCE SUITE</text>
  </g>

  <!-- Headline -->
  <g transform="translate(64, 178)">
    <text fill="#0f172a" font-size="56" font-weight="800" letter-spacing="-1.5">
      <tspan x="0" y="0">Catch financial</tspan>
      <tspan x="0" y="64">crime in </tspan>
      <tspan fill="url(#markGrad)" font-weight="900">real time.</tspan>
    </text>
  </g>

  <!-- Subheadline -->
  <g transform="translate(64, 332)">
    <text fill="#475569" font-size="18" font-weight="500">
      <tspan x="0" y="0">A compliance-grade demo that turns raw transaction</tspan>
      <tspan x="0" y="26">flows into auditable intelligence — typology detection,</tspan>
      <tspan x="0" y="52">explainable AI scoring, and SAR-ready case files.</tspan>
    </text>
  </g>

  <!-- Feature pills -->
  <g transform="translate(64, 432)" font-size="12" font-weight="700" letter-spacing="0.4">
    <g>
      <rect x="0" y="0" width="160" height="28" rx="14" fill="#eff6ff" stroke="#bfdbfe"/>
      <text x="80" y="18" text-anchor="middle" fill="#1d4ed8">EXPLAINABLE AI</text>
    </g>
    <g transform="translate(170, 0)">
      <rect x="0" y="0" width="170" height="28" rx="14" fill="#f5f3ff" stroke="#ddd6fe"/>
      <text x="85" y="18" text-anchor="middle" fill="#6d28d9">FATF JURISDICTIONS</text>
    </g>
    <g transform="translate(0, 38)">
      <rect x="0" y="0" width="160" height="28" rx="14" fill="#ecfdf5" stroke="#a7f3d0"/>
      <text x="80" y="18" text-anchor="middle" fill="#047857">DOCUMENT AI</text>
    </g>
    <g transform="translate(170, 38)">
      <rect x="0" y="0" width="170" height="28" rx="14" fill="#fdf2f8" stroke="#fbcfe8"/>
      <text x="85" y="18" text-anchor="middle" fill="#be185d">REAL-TIME ALERTS</text>
    </g>
  </g>

  <!-- CTA -->
  <g transform="translate(64, 540)">
    <rect x="0" y="0" width="280" height="48" rx="10" fill="url(#markGrad)" filter="url(#cardShadow)"/>
    <text x="140" y="31" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="700" letter-spacing="0.4">
      cleartrace.aurimas.io  →
    </text>
    <text x="296" y="31" fill="#64748b" font-size="13" font-weight="500">Built by Aurimas Nausėdas</text>
  </g>

  <!-- ───── RIGHT COLUMN — product collage ───── -->

  <!-- KPI strip -->
  <g transform="translate(700, 80)" filter="url(#cardShadow)">
    <rect width="436" height="78" rx="14" fill="url(#card)" stroke="#e2e8f0"/>
    <g transform="translate(20, 14)">
      <text fill="#64748b" font-size="9.5" font-weight="700" letter-spacing="1.2">ALERTS TODAY</text>
      <text x="0" y="34" fill="#0f172a" font-size="28" font-weight="800">147</text>
      <text x="0" y="52" fill="#059669" font-size="11" font-weight="600">▲ 12% vs avg</text>
    </g>
    <line x1="148" y1="14" x2="148" y2="64" stroke="#e2e8f0"/>
    <g transform="translate(168, 14)">
      <text fill="#64748b" font-size="9.5" font-weight="700" letter-spacing="1.2">SAR FILED</text>
      <text x="0" y="34" fill="#0f172a" font-size="28" font-weight="800">23</text>
      <text x="0" y="52" fill="#d97706" font-size="11" font-weight="600">15.6% conversion</text>
    </g>
    <line x1="296" y1="14" x2="296" y2="64" stroke="#e2e8f0"/>
    <g transform="translate(316, 14)">
      <text fill="#64748b" font-size="9.5" font-weight="700" letter-spacing="1.2">MEDIAN SLA</text>
      <text x="0" y="34" fill="#0f172a" font-size="28" font-weight="800">14m</text>
      <text x="0" y="52" fill="#059669" font-size="11" font-weight="600">within target</text>
    </g>
  </g>

  <!-- World map / corridors -->
  <g transform="translate(700, 178)" filter="url(#cardShadow)">
    <rect width="436" height="232" rx="14" fill="url(#card)" stroke="#e2e8f0"/>
    <text x="20" y="28" fill="#475569" font-size="10.5" font-weight="700" letter-spacing="1.4">CROSS-BORDER RISK CORRIDORS</text>

    <g transform="translate(20, 44)" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="0.6">
      <path d="M28 60 Q22 28 60 22 Q92 18 108 50 Q120 82 96 110 Q70 120 44 110 Q22 92 28 60 Z"/>
      <path d="M84 130 Q92 116 110 124 Q124 142 116 168 Q104 182 88 174 Q78 154 84 130 Z"/>
      <path d="M192 50 Q198 32 224 36 Q244 42 246 60 Q240 78 220 80 Q198 78 192 50 Z"/>
      <path d="M212 90 Q230 84 246 96 Q256 122 248 152 Q236 170 220 168 Q204 154 208 124 Q204 102 212 90 Z"/>
      <path d="M260 40 Q288 28 332 38 Q372 52 380 80 Q374 110 340 116 Q298 114 270 96 Q254 72 260 40 Z"/>
      <path d="M340 152 Q360 146 376 158 Q380 172 366 180 Q346 178 338 168 Q336 158 340 152 Z"/>
    </g>

    <g transform="translate(20, 44)" fill="none" stroke-linecap="round" filter="url(#softGlow)">
      <path d="M70 80 Q120 30 140 100" stroke="url(#arcRed)" stroke-width="2.8"/>
      <path d="M70 70 Q200 4 308 56" stroke="url(#arcRed)" stroke-width="2.4"/>
      <path d="M212 60 Q256 24 288 80" stroke="url(#arcAmber)" stroke-width="2.2"/>
      <path d="M348 70 Q352 110 352 154" stroke="url(#arcAmber)" stroke-width="1.8"/>
      <path d="M214 56 Q140 16 78 70" stroke="url(#arcGreen)" stroke-width="1.6"/>
      <path d="M104 156 Q170 132 220 130" stroke="url(#arcRed)" stroke-width="1.6"/>
    </g>

    <g transform="translate(20, 44)">
      <g>
        <circle cx="140" cy="100" r="9" fill="#dc2626" fill-opacity="0.2"/>
        <circle cx="140" cy="100" r="4.2" fill="#dc2626" stroke="#ffffff" stroke-width="1.4"/>
      </g>
      <g>
        <circle cx="308" cy="56" r="9" fill="#dc2626" fill-opacity="0.2"/>
        <circle cx="308" cy="56" r="4.2" fill="#dc2626" stroke="#ffffff" stroke-width="1.4"/>
      </g>
      <g>
        <circle cx="220" cy="130" r="8" fill="#dc2626" fill-opacity="0.2"/>
        <circle cx="220" cy="130" r="3.6" fill="#dc2626" stroke="#ffffff" stroke-width="1.3"/>
      </g>
      <circle cx="288" cy="80" r="3.6" fill="#d97706" stroke="#ffffff" stroke-width="1.3"/>
      <circle cx="352" cy="154" r="3.4" fill="#d97706" stroke="#ffffff" stroke-width="1.3"/>
      <circle cx="70" cy="76" r="3.2" fill="#059669" stroke="#ffffff" stroke-width="1.2"/>
      <circle cx="212" cy="58" r="3.2" fill="#059669" stroke="#ffffff" stroke-width="1.2"/>
    </g>

    <g transform="translate(20, 200)" font-size="10" font-weight="600" fill="#475569">
      <g>
        <circle cx="6" cy="6" r="4" fill="#dc2626"/>
        <text x="16" y="10">High-risk · 18</text>
      </g>
      <g transform="translate(110, 0)">
        <circle cx="6" cy="6" r="4" fill="#d97706"/>
        <text x="16" y="10">Monitored · 32</text>
      </g>
      <g transform="translate(232, 0)">
        <circle cx="6" cy="6" r="4" fill="#059669"/>
        <text x="16" y="10">Standard · 196</text>
      </g>
    </g>
  </g>

  <!-- Explainability card -->
  <g transform="translate(700, 430)" filter="url(#cardShadow)">
    <rect width="436" height="160" rx="14" fill="url(#card)" stroke="#e2e8f0"/>
    <text x="20" y="28" fill="#475569" font-size="10.5" font-weight="700" letter-spacing="1.4">WHY WAS THIS FLAGGED? — MODEL ATTRIBUTIONS</text>

    <g transform="translate(20, 50)" font-size="11" font-weight="600">
      <g>
        <text fill="#334155">Counterparty jurisdiction</text>
        <text x="396" text-anchor="end" fill="#b91c1c" font-weight="700">+0.45</text>
        <rect x="0" y="6" width="396" height="4" rx="2" fill="#f1f5f9"/>
        <line x1="198" y1="4" x2="198" y2="14" stroke="#94a3b8" stroke-width="0.8"/>
        <rect x="198" y="6" width="180" height="4" rx="2" fill="#dc2626"/>
      </g>
      <g transform="translate(0, 28)">
        <text fill="#334155">Amount vs. CTR threshold</text>
        <text x="396" text-anchor="end" fill="#b91c1c" font-weight="700">+0.35</text>
        <rect x="0" y="6" width="396" height="4" rx="2" fill="#f1f5f9"/>
        <line x1="198" y1="4" x2="198" y2="14" stroke="#94a3b8" stroke-width="0.8"/>
        <rect x="198" y="6" width="138" height="4" rx="2" fill="#dc2626"/>
      </g>
      <g transform="translate(0, 56)">
        <text fill="#334155">Behavioural typology match</text>
        <text x="396" text-anchor="end" fill="#b91c1c" font-weight="700">+0.30</text>
        <rect x="0" y="6" width="396" height="4" rx="2" fill="#f1f5f9"/>
        <line x1="198" y1="4" x2="198" y2="14" stroke="#94a3b8" stroke-width="0.8"/>
        <rect x="198" y="6" width="120" height="4" rx="2" fill="#dc2626"/>
      </g>
      <g transform="translate(0, 84)">
        <text fill="#334155">KYC review recency</text>
        <text x="396" text-anchor="end" fill="#047857" font-weight="700">−0.04</text>
        <rect x="0" y="6" width="396" height="4" rx="2" fill="#f1f5f9"/>
        <line x1="198" y1="4" x2="198" y2="14" stroke="#94a3b8" stroke-width="0.8"/>
        <rect x="178" y="6" width="20" height="4" rx="2" fill="#059669"/>
      </g>
    </g>
  </g>
</svg>
